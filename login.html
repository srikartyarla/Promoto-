<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Promoto</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">Promoto</a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="organize.html">Organize an Event</a></li>
                </ul>
            </nav>
        </div>
        

    <main class="min-h-screen flex flex-col md:flex-row items-center justify-center bg-[#1a1a1a] p-4">

    <div class="hidden md:flex md:w-1/2 justify-center items-center p-8">
        <img src="Gemini_Generated_Image_b3a5svb3a5svb3a5 - Copy.png" alt="PROMOTO Logo" class="max-w-full h-auto">
    </div>

    <div class="w-full md:w-1/2 flex justify-center items-center p-4">
        <div class="w-full max-w-md p-10 rounded-2xl bg-[#2b2b2b] border border-gray-700 shadow-2xl">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-white">Login</h1>
                <p class="text-gray-400 mt-2">Sign in to manage and find college events.</p>
            </div>

            <form id="auth-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium mb-2 text-gray-300">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 bg-[#1f2937] border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea6e08] text-white" placeholder="you@promoto.com">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium mb-2 text-gray-300">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 bg-[#1f2937] border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea6e08] text-white" placeholder="••••••••">
                </div>
                
                <button type="submit" class="w-full py-3 bg-[#ea6e08] text-white font-bold rounded-lg hover:bg-[#d46307] transition-all transform hover:scale-105 shadow-lg">
                    Login
                </button>
            </form>

            <div class="mt-8 text-center space-y-4">
                <p><a href="#" class="text-sm text-gray-400 hover:text-white hover:underline transition-colors">Forgot Password?</a></p>
                <p>
                    <span class="text-sm text-gray-400">Don't have an account?</span>
                    <a href="signup.html" class="text-sm font-bold text-white hover:underline ml-1">Sign up now</a>
                </p>
            </div>
        </div>
    </div>

</main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2025 College Event Hub. All Rights Reserved.</p>
        </div>
    </footer>

   <script>
    // Redirect to home if already logged in
    if (localStorage.getItem('promoto_user')) {
        window.location.href = 'index.html';
    }

    function logout() {
        localStorage.removeItem('promoto_user');
        window.location.href = 'login.html';
    }

    document.getElementById('auth-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const response = await fetch('https://promoto-glx0.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (response.ok) {
                localStorage.setItem('promoto_user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } else {
                alert('Error: ' + data.message);
            }
        } catch (error) {
            alert('Could not connect to the server.');
        }
    });
</script>
</body>
</html>

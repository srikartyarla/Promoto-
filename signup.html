<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PROMOTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; } </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white">
    <div class="w-full max-w-md mx-auto p-8 rounded-2xl bg-[#2b2b2b] border border-gray-700 shadow-lg">
        <div class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-extrabold text-white">Create Account</h1>
            <p class="text-gray-400 mt-2">Join the PROMOTO</p>
        </div>
        <form id="auth-form" class="space-y-6">
            <div>
                <label for="fullname" class="block text-sm font-medium mb-2 text-gray-300">Full Name</label>
                <input type="text" id="fullname" name="fullname" required class="w-full px-4 py-2 bg-gray-800 border border-gray rounded-lg" placeholder="Enter your full name">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium mb-2 text-gray-300">Email Address</label>
                <input type="email" id="email" name="email" required class="w-full px-4 py-2 bg-gray-800 border border-gray rounded-lg" placeholder="you@promoto.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium mb-2 text-gray-300">Password</label>
                <div class="relative password-container">
                    <input type="password" id="password" name="password" required class="w-full px-4 py-2 bg-gray-800 border border-gray rounded-lg" placeholder="••••••••">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-gray-400 toggle-password">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5"><path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" /><path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.18l.82-1.425a1.651 1.651 0 0 1 1.516-.865h12.878a1.651 1.651 0 0 1 1.516.865l.82 1.425a1.651 1.651 0 0 1 0 1.18l-.82 1.425a1.651 1.651 0 0 1-1.516.865H3.001a1.651 1.651 0 0 1-1.516-.865l-.82-1.425ZM5.525 12a4.475 4.475 0 0 0 8.95 0H5.525Z" clip-rule="evenodd" /></svg>
                    </span>
                </div>
            </div>
            <div>
                <label for="confirm-password" class="block text-sm font-medium mb-2 text-gray-300">Confirm Password</label>
                <div class="relative password-container">
                    <input type="password" id="confirm-password" name="confirm-password" required class="w-full px-4 py-2 bg-gray-800 border border-gray rounded-lg" placeholder="••••••••">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-gray-400 toggle-password">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5"><path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" /><path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.18l.82-1.425a1.651 1.651 0 0 1 1.516-.865h12.878a1.651 1.651 0 0 1 1.516.865l.82 1.425a1.651 1.651 0 0 1 0 1.18l-.82 1.425a1.651 1.651 0 0 1-1.516.865H3.001a1.651 1.651 0 0 1-1.516-.865l-.82-1.425ZM5.525 12a4.475 4.475 0 0 0 8.95 0H5.525Z" clip-rule="evenodd" /></svg>
                    </span>
                </div>
            </div>
            <button type="submit" class="w-full py-3 bg-[#ea6e08] text-white font-bold rounded-lg hover:bg-[#d46307]">Sign Up</button>
        </form>
        <div class="mt-8 text-center">
             <p><span class="text-sm text-gray-400">Already have an account?</span><a href="login.html" class="text-sm font-bold text-white hover:underline ml-1">Login here</a></p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('auth-form');

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                const fullname = document.getElementById('fullname').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (password !== confirmPassword) {
                    alert('Passwords do not match. Please try again.');
                    return;
                }

                const signupData = { fullname, email, password };

                try {
                    const response = await fetch('http://127.0.0.1:5000/api/signup', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(signupData)
                    });

                    const responseData = await response.json();

                    if (response.ok) {
                        alert('Signup successful! Please log in.');
                        window.location.href = 'login.html'; // Redirect to login page
                    } else {
                        // Display error message from the server
                        alert('Error: ' + responseData.message);
                    }
                } catch (error) {
                    console.error('Signup failed:', error);
                    alert('Could not connect to the server. Please try again later.');
                }
            });
        });
    </script>
</body>
</html>
